<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1448" height="1086" viewBox="0 0 1448 1086" role="img" aria-labelledby="title desc">
  <title>HR ChatChart SVG Concept - 04_geometric_box_chart</title>
  <desc>Editable vector recreation of the HR ChatChart / HR 話圖 logo concept. All major elements are separated into named groups.</desc>
  <defs>
    <filter id="softShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="barGray" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#C9C9C9"/><stop offset="1" stop-color="#777777"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#F02027"/><stop offset="1" stop-color="#C8101A"/>
    </linearGradient>
    <style><![CDATA[
      .wordmark { font-family: "Aptos Display", "Segoe UI", "Noto Sans", Arial, sans-serif; font-weight: 650; letter-spacing: .5px; }
      .zhmark { font-family: "Noto Sans TC", "Microsoft JhengHei", "PingFang TC", sans-serif; font-weight: 700; letter-spacing: 10px; }
      .stroke-round { stroke-linecap: round; stroke-linejoin: round; }
      .no-fill { fill: none; }
    ]]></style>
  </defs>
  <rect width="1448" height="1086" fill="#FFFFFF"/>

  <g id="main-logo" transform="translate(180,275)">
    <g id="logo-symbol-geometric" data-layer="geometric speech box + chart">
      <g id="geometric-speech-box" fill="none" stroke="#1F1F1F" stroke-width="17" stroke-linejoin="round">
        <path d="M34 42 L78 0 H328 Q350 0 350 22 V190 Q350 212 328 212 H119 L34 286 Z"/>
      </g>
      <g id="chart-bars">
        <rect x="110" y="120" width="48" height="78" fill="#B8B8B8"/>
        <rect x="182" y="88" width="48" height="110" fill="#777777"/>
        <rect x="255" y="38" width="51" height="160" fill="#D71920"/>
      </g></g>
    
  <g id="bilingual-wordmark" data-layer="editable text">
    <text id="chinese-name-red-hr" class="wordmark" x="455" y="115" font-size="128" fill="#D71920">HR</text>
    <text id="chinese-name-black-huatu" class="zhmark" x="670" y="115" font-size="110" fill="#1F1F1F">話圖</text>
    <text id="english-name-black-hr" class="wordmark" x="455" y="250" font-size="88" fill="#1F1F1F">HR</text>
    <text id="english-name-red-chatchart" class="wordmark" x="615" y="250" font-size="88" fill="#D71920">ChatChart</text>
  </g>
  </g>

  <g id="icon-only-app-tile" transform="translate(624,758)" data-layer="icon-only version">
    <rect x="0" y="0" width="205" height="205" rx="38" fill="#FFFFFF" filter="url(#softShadow)"/>
    <g transform="translate(28,28) scale(0.43)">

      <g id="geometric-speech-box" fill="none" stroke="#1F1F1F" stroke-width="17" stroke-linejoin="round">
        <path d="M34 42 L78 0 H328 Q350 0 350 22 V190 Q350 212 328 212 H119 L34 286 Z"/>
      </g>
      <g id="chart-bars">
        <rect x="110" y="120" width="48" height="78" fill="#B8B8B8"/>
        <rect x="182" y="88" width="48" height="110" fill="#777777"/>
        <rect x="255" y="38" width="51" height="160" fill="#D71920"/>
      </g>
    </g>
  </g>

</svg>
