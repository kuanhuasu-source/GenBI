<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1448" height="1086" viewBox="0 0 1448 1086" role="img" aria-labelledby="title desc">
  <title>HR ChatChart SVG Concept - 02_soft_app_icon</title>
  <desc>Editable vector recreation of the HR ChatChart / HR 話圖 logo concept. All major elements are separated into named groups.</desc>
  <defs>
    <filter id="softShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="barGray" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#C9C9C9"/><stop offset="1" stop-color="#777777"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#F02027"/><stop offset="1" stop-color="#C8101A"/>
    </linearGradient>
    <style><![CDATA[
      .wordmark { font-family: "Aptos Display", "Segoe UI", "Noto Sans", Arial, sans-serif; font-weight: 650; letter-spacing: .5px; }
      .zhmark { font-family: "Noto Sans TC", "Microsoft JhengHei", "PingFang TC", sans-serif; font-weight: 700; letter-spacing: 10px; }
      .stroke-round { stroke-linecap: round; stroke-linejoin: round; }
      .no-fill { fill: none; }
    ]]></style>
  </defs>
  <rect width="1448" height="1086" fill="#FFFFFF"/>

  <g id="main-logo" transform="translate(215,275)">
    <g id="logo-symbol-soft" data-layer="soft speech bubble + chart">
      <g id="soft-chat-bubble" filter="url(#softShadow)">
        <path d="M36 48 Q36 20 64 20 H300 Q328 20 328 48 V197 Q328 225 300 225 H120 L52 270 L66 225 H64 Q36 225 36 197 Z" fill="#FFFFFF" stroke="#DDDDDD" stroke-width="3"/>
      </g>
      <g id="chart-bars">
        <rect x="96" y="151" width="43" height="70" rx="8" fill="#CFCFCF"/>
        <rect x="164" y="111" width="43" height="110" rx="8" fill="#8D8D8D"/>
        <rect x="231" y="74" width="48" height="147" rx="8" fill="#1F1F1F"/>
      </g>
      <g id="rising-line-arrow" class="stroke-round" fill="none" stroke="#D71920" stroke-width="14">
        <path d="M75 118 L134 92 L185 92 L268 24"/>
        <path d="M245 23 L273 23 L273 51"/>
      </g>
      <g id="line-nodes" fill="#D71920">
        <circle cx="75" cy="118" r="12"/><circle cx="134" cy="92" r="12"/><circle cx="185" cy="92" r="12"/>
      </g></g>
    
  <g id="bilingual-wordmark" data-layer="editable text">
    <text id="chinese-name-red-hr" class="wordmark" x="430" y="125" font-size="128" fill="#D71920">HR</text>
    <text id="chinese-name-black-huatu" class="zhmark" x="645" y="125" font-size="110" fill="#1F1F1F">話圖</text>
    <text id="english-name-black-hr" class="wordmark" x="430" y="260" font-size="88" fill="#1F1F1F">HR</text>
    <text id="english-name-red-chatchart" class="wordmark" x="590" y="260" font-size="88" fill="#D71920">ChatChart</text>
  </g>
  </g>

  <g id="icon-only-app-tile" transform="translate(625,760)" data-layer="icon-only version">
    <rect x="0" y="0" width="205" height="205" rx="38" fill="#FFFFFF" filter="url(#softShadow)"/>
    <g transform="translate(28,28) scale(0.43)">

      <g id="soft-chat-bubble" filter="url(#softShadow)">
        <path d="M36 48 Q36 20 64 20 H300 Q328 20 328 48 V197 Q328 225 300 225 H120 L52 270 L66 225 H64 Q36 225 36 197 Z" fill="#FFFFFF" stroke="#DDDDDD" stroke-width="3"/>
      </g>
      <g id="chart-bars">
        <rect x="96" y="151" width="43" height="70" rx="8" fill="#CFCFCF"/>
        <rect x="164" y="111" width="43" height="110" rx="8" fill="#8D8D8D"/>
        <rect x="231" y="74" width="48" height="147" rx="8" fill="#1F1F1F"/>
      </g>
      <g id="rising-line-arrow" class="stroke-round" fill="none" stroke="#D71920" stroke-width="14">
        <path d="M75 118 L134 92 L185 92 L268 24"/>
        <path d="M245 23 L273 23 L273 51"/>
      </g>
      <g id="line-nodes" fill="#D71920">
        <circle cx="75" cy="118" r="12"/><circle cx="134" cy="92" r="12"/><circle cx="185" cy="92" r="12"/>
      </g>
    </g>
  </g>

</svg>
