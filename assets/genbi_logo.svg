<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- 米黃外框 -->
  <rect width="120" height="120" rx="22" fill="#FFF7E8"/>
  <!-- 暗紅圓 backdrop -->
  <circle cx="60" cy="62" r="52" fill="#8B2C2E"/>

  <!-- ===== 廚師帽(高款 toque) ===== -->
  <path d="M 32 30
           C 26 8, 44 7, 47 17
           C 46 3, 64 3, 64 18
           C 64 4, 82 6, 82 20
           C 86 12, 90 24, 84 30 Z"
        fill="#FAF0E0" stroke="#4A2818" stroke-width="2.2" stroke-linejoin="round"/>
  <rect x="32" y="30" width="52" height="9" rx="1.5" fill="#FAF0E0" stroke="#4A2818" stroke-width="2.2"/>
  <ellipse cx="58" cy="34" rx="16" ry="1.8" fill="#E8D9C4" opacity="0.6"/>

  <!-- ===== 圓胖大臉(放大,頂部進帽底、下緣壓到衣領) ===== -->
  <ellipse cx="60" cy="60" rx="23" ry="22" fill="#F2C9A3" stroke="#4A2818" stroke-width="2.2"/>

  <!-- 耳朵(兩側貼出來) -->
  <path d="M 37 60 Q 33 61, 34 67 Q 36 69, 39 67 Z" fill="#F2C9A3" stroke="#4A2818" stroke-width="1.8" stroke-linejoin="round"/>
  <path d="M 83 60 Q 87 61, 86 67 Q 84 69, 81 67 Z" fill="#F2C9A3" stroke="#4A2818" stroke-width="1.8" stroke-linejoin="round"/>

  <!-- 禿頭頂(疊在帽底前緣 + 臉的接合區) -->
  <ellipse cx="60" cy="41" rx="15" ry="4" fill="#F2C9A3" stroke="#4A2818" stroke-width="2"/>

  <!-- 眉毛 -->
  <path d="M 47 51 Q 51 48, 55 51" stroke="#3D2117" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M 65 51 Q 69 48, 73 51" stroke="#3D2117" stroke-width="2.2" fill="none" stroke-linecap="round"/>

  <!-- 眼睛(明顯的眼白 + 黑瞳孔 + 高光) -->
  <ellipse cx="51" cy="57" rx="3.2" ry="3.6" fill="#FFFFFF" stroke="#4A2818" stroke-width="1.6"/>
  <circle cx="51" cy="58" r="1.8" fill="#2A1810"/>
  <circle cx="51.6" cy="57.2" r="0.8" fill="#FFFFFF"/>

  <ellipse cx="69" cy="57" rx="3.2" ry="3.6" fill="#FFFFFF" stroke="#4A2818" stroke-width="1.6"/>
  <circle cx="69" cy="58" r="1.8" fill="#2A1810"/>
  <circle cx="69.6" cy="57.2" r="0.8" fill="#FFFFFF"/>

  <!-- 紅潤臉頰 -->
  <ellipse cx="43" cy="66" rx="4.5" ry="3.2" fill="#E69585" opacity="0.6"/>
  <ellipse cx="77" cy="66" rx="4.5" ry="3.2" fill="#E69585" opacity="0.6"/>

  <!-- 鼻子(圓潤) -->
  <ellipse cx="60" cy="65" rx="2.6" ry="2.8" fill="#DBA982" stroke="#4A2818" stroke-width="1.5"/>

  <!-- 微笑大嘴 -->
  <path d="M 50 72 Q 60 79, 70 72" stroke="#4A2818" stroke-width="2.4" fill="none" stroke-linecap="round"/>
  <path d="M 50 72 Q 49 70, 47 70" stroke="#4A2818" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <path d="M 70 72 Q 71 70, 73 70" stroke="#4A2818" stroke-width="1.6" fill="none" stroke-linecap="round"/>

  <!-- 雙下巴 -->
  <path d="M 48 77 Q 60 81, 72 77" stroke="#C99570" stroke-width="1.6" fill="none"/>

  <!-- ===== 紅領巾(縮小,卡在下巴與衣服之間) ===== -->
  <path d="M 50 80
           L 60 84
           L 70 80
           L 68 86
           L 60 87
           L 52 86 Z"
        fill="#D9342B" stroke="#4A2818" stroke-width="1.8" stroke-linejoin="round"/>
  <ellipse cx="60" cy="83.5" rx="2.4" ry="1.4" fill="#A82A22" stroke="#4A2818" stroke-width="1.2"/>

  <!-- ===== 圓胖身體(上緣壓到臉) ===== -->
  <path d="M 26 82
           Q 20 100, 24 118
           L 96 118
           Q 100 100, 94 82
           Q 80 78, 60 80
           Q 40 78, 26 82 Z"
        fill="#FAF0E0" stroke="#4A2818" stroke-width="2.2" stroke-linejoin="round"/>

  <line x1="60" y1="80" x2="60" y2="118" stroke="#4A2818" stroke-width="1" stroke-dasharray="2 2" opacity="0.4"/>

  <circle cx="50" cy="92" r="1.8" fill="#4A2818"/>
  <circle cx="50" cy="101" r="1.8" fill="#4A2818"/>
  <circle cx="50" cy="110" r="1.8" fill="#4A2818"/>
  <circle cx="70" cy="92" r="1.8" fill="#4A2818"/>
  <circle cx="70" cy="101" r="1.8" fill="#4A2818"/>
  <circle cx="70" cy="110" r="1.8" fill="#4A2818"/>

  <!-- ===== 右手臂伸出拿鍋 ===== -->
  <path d="M 90 88
           Q 102 84, 110 90
           L 110 97
           Q 102 93, 90 96 Z"
        fill="#FAF0E0" stroke="#4A2818" stroke-width="2.2" stroke-linejoin="round"/>
  <rect x="108" y="89" width="3" height="9" fill="#E8D9C4" stroke="#4A2818" stroke-width="1.5"/>
  <circle cx="112" cy="93" r="3.5" fill="#F2C9A3" stroke="#4A2818" stroke-width="1.8"/>

  <!-- ===== 鍋子(平底鍋側視 + 長柄) ===== -->
  <g transform="rotate(-12 118 93)">
    <rect x="113" y="91" width="13" height="4.5" rx="1.5" fill="#5D3A1F" stroke="#4A2818" stroke-width="1.5"/>
    <circle cx="125" cy="93" r="1.4" fill="#4A2818"/>
  </g>

  <path d="M 82 100
           Q 82 115, 97 115
           Q 113 115, 113 100 Z"
        fill="#1A1A1A" stroke="#4A2818" stroke-width="1.5"/>
  <ellipse cx="97" cy="100" rx="16" ry="3.2" fill="#3A3A3A" stroke="#4A2818" stroke-width="1.5"/>
  <ellipse cx="97" cy="99.5" rx="12" ry="1.3" fill="#5A5A5A" opacity="0.5"/>

  <!-- ===== 跳起的食材 ===== -->
  <circle cx="87" cy="84" r="2.8" fill="#FF6B47" stroke="#4A2818" stroke-width="1.2"/>
  <circle cx="97" cy="78" r="2.5" fill="#7DB650" stroke="#4A2818" stroke-width="1.2"/>
  <circle cx="107" cy="82" r="2.5" fill="#FFC130" stroke="#4A2818" stroke-width="1.2"/>
  <circle cx="92" cy="92" r="2" fill="#FF6B47" stroke="#4A2818" stroke-width="1.2"/>
  <circle cx="104" cy="94" r="1.8" fill="#7DB650" stroke="#4A2818" stroke-width="1.2"/>

  <!-- ===== 蒸氣 ===== -->
  <path d="M 89 74 Q 91 69, 88 64 Q 90 59, 88 54"
        stroke="#E8D9C4" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.85"/>
  <path d="M 103 72 Q 105 67, 102 62 Q 104 57, 102 52"
        stroke="#E8D9C4" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.85"/>
</svg>
