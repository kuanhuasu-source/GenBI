[pytest]
# v0.14.0+ (M4a): pytest config for Upload Workspace unit + integration tests
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    requires_mongo: 需要 MongoDB(本地 / mongomock)— 沒裝 mongomock 會 skip
    integration: end-to-end integration test(M4b)— 較慢
    slow: 慢測試(>5s)— CI 可選擇性跳過

addopts =
    --strict-markers
    -ra
    --tb=short
    --color=yes

filterwarnings =
    ignore::DeprecationWarning:pymongo.*
    ignore::DeprecationWarning:openai.*
